# Nixpacks configuration for hybrid Node/Python project
[phases.setup]
nixPkgs = ["nodejs_20", "python311", "gcc"]

[phases.install]
cmds = [
  "npm install",
  "python -m venv /opt/venv && /opt/venv/bin/pip install -r backend/requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "PATH=\"/opt/venv/bin:$PATH\" uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
